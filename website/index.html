<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- Stylers -->
<link rel="stylesheet" href="styles/theme/primary.css">
<link rel="stylesheet" href="styles/components/globalmessage.css">
<title>Kinlo</title>
<style>
body {
min-height: 100vh;
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
gap: 56px;
}
.notice {
text-align: center;
max-width: 420px;
}
.notice .eyebrow {
display: block;
color: var(--text-dim);
font-size: 0.75rem;
font-weight: 700;
text-transform: uppercase;
letter-spacing: 0.08em;
margin-bottom: 10px;
}
.notice p {
margin: 12px auto 0;
}
.countdown {
display: flex;
justify-content: center;
gap: 18px;
margin-top: 28px;
}
.countdown .unit {
display: flex;
flex-direction: column;
align-items: center;
gap: 4px;
}
.countdown .value {
font-family: 'Brasika', Nunito, sans-serif;
font-size: 1.8rem;
color: var(--text);
line-height: 1;
}
.countdown .label {
font-size: 0.7rem;
color: var(--text-dim);
text-transform: uppercase;
letter-spacing: 0.06em;
}
.enter-site[aria-disabled="true"] {
color: var(--text-dim);
border-color: var(--border);
cursor: not-allowed;
opacity: 0.6;
}
.enter-site[aria-disabled="true"]:hover {
color: var(--text-dim);
border-color: var(--border);
}
</style>
</head>
<body>
<!-- 
    Hello User! You are currently viewing the HTML of Kinlo!
    Unfortunately, this website is not open source, so trying to take our code is a no go.
    I, the developer, kindly ask you to not use the console unless you are trying to bug find.
    Thank you!
    From,
    Adhyayan Hazra
    -->
<div class="notice">
<span class="eyebrow"><h2>Kinlo</h2></span>
<h1>Under Construction</h1>
<p>Hello User! Currently the site is under construction. Please come back on the time displayed below for the site to be available to the public.</p>
<div class="countdown" id="countdown">
<div class="unit">
<span class="value" id="cd-days">--</span>
<span class="label">Days</span>
</div>
<div class="unit">
<span class="value" id="cd-hours">--</span>
<span class="label">Hours</span>
</div>
<div class="unit">
<span class="value" id="cd-minutes">--</span>
<span class="label">Minutes</span>
</div>
<div class="unit">
<span class="value" id="cd-seconds">--</span>
<span class="label">Seconds</span>
</div>
</div>
</div>
<button class="enter-site" id="enter-site" aria-disabled="true" onclick="notify('The website is currently not open.', { type: 'error' })">Enter Site</button>
<script type="module" src="scripts/frontend/ui/globalmessage.module.js"></script>
<script type="module" src="scripts/frontend/ui/globalmessage-sync.module.js"></script>
<script>
const releaseDate = new Date(2026, 5, 30, 0, 0, 0);

const chirpAudio = new Audio('scripts/frontend/sfx/Chirp.mp3');
chirpAudio.loop = true;
chirpAudio.volume = 0.35;
window.addEventListener('load', () => {
    chirpAudio.play().catch(() => {});
});

function updateCountdown() {
    const now = new Date();
    const diff = releaseDate - now;

    if (diff <= 0) {
        document.getElementById('countdown').outerHTML = '<p>We are live. Thank you for your patience.</p>';
        clearInterval(timer);
        return;
    }

    const days = Math.floor(diff / (1000 * 60 * 60 * 24));
    const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
    const minutes = Math.floor((diff / (1000 * 60)) % 60);
    const seconds = Math.floor((diff / 1000) % 60);

    document.getElementById('cd-days').textContent = String(days).padStart(2, '0');
    document.getElementById('cd-hours').textContent = String(hours).padStart(2, '0');
    document.getElementById('cd-minutes').textContent = String(minutes).padStart(2, '0');
    document.getElementById('cd-seconds').textContent = String(seconds).padStart(2, '0');
}

updateCountdown();
const timer = setInterval(updateCountdown, 1000);
</script>
</body>
</html>
